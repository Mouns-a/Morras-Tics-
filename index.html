<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Morras Tics Cyberpunk Épico</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap');

body {
  margin: 0;
  padding: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
  font-family: 'Poppins', sans-serif;
  animation: fondoColor 10s ease-in-out infinite alternate;
}

@keyframes fondoColor {
  0% { background: radial-gradient(circle at center, #1a001f, #000); }
  25% { background: radial-gradient(circle at center, #2b0044, #0a001a); }
  50% { background: radial-gradient(circle at center, #000066, #000011); }
  75% { background: radial-gradient(circle at center, #660066, #220022); }
  100% { background: radial-gradient(circle at center, #1a001f, #000); }
}

canvas {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 0;
}

.contenedor {
  position: relative;
  text-align: center;
  z-index: 1;
  color: #fff;
  animation: aparecer 2s ease-in-out;
}

@keyframes aparecer {
  0% { opacity: 0; transform: scale(0.8); }
  100% { opacity: 1; transform: scale(1); }
}

.titulo {
  margin-top: 30px;
  font-size: 4rem;
  color: #ffb7ff;
  text-shadow: 0 0 10px #ff00ff,0 0 20px #ff00ff,0 0 40px #ff00ff;
  animation: parpadeo 2s infinite alternate;
}

@keyframes parpadeo {
  0% { text-shadow: 0 0 10px #ff00ff,0 0 20px #ff00ff,0 0 40px #ff00ff; }
  50% { text-shadow: 0 0 15px #ff66ff,0 0 30px #ff66ff,0 0 50px #ff66ff; }
  100% { text-shadow: 0 0 10px #ff00ff,0 0 20px #ff00ff,0 0 40px #ff00ff; }
}

.subtitulo {
  font-size: 1.8rem;
  color: #e3d9ff;
  text-shadow: 0 0 15px #a700ff;
  opacity: 0;
  animation: aparecerSub 3s ease-in-out forwards 1.5s;
}

@keyframes aparecerSub {
  to { opacity: 1; transform: translateY(0); }
}

.boton {
  margin-top: 40px;
  display: inline-block;
  padding: 14px 40px;
  background: linear-gradient(90deg, #ff00ff, #a700ff);
  border: none;
  border-radius: 30px;
  color: #fff;
  font-size: 1.3rem;
  text-decoration: none;
  box-shadow: 0 0 25px #ff00ff80;
  transition: transform 0.3s, box-shadow 0.3s;
  animation: aparecerSub 3s ease-in-out forwards 3s;
}

.boton:hover {
  transform: scale(1.08);
  box-shadow: 0 0 50px #ff00ff;
}

@media (max-width: 768px) {
  .titulo { font-size: 2.5rem; }
  .subtitulo { font-size: 1.3rem; }
}
</style>
</head>
<body>

<canvas id="circuitos"></canvas>

<div class="contenedor">
  <h1 class="titulo">Morras Tics</h1>
  <p class="subtitulo">Feminizando la tecnología</p>
  <a href="#" class="boton">Conoce más sobre nosotras</a>
</div>

<script>
const canvas = document.getElementById('circuitos');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const nodes = [];
const nodeCount = 90;
for(let i=0;i<nodeCount;i++){
  nodes.push({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    vx: (Math.random()-0.5)*2,
    vy: (Math.random()-0.5)*2,
    radius: 2 + Math.random()*3,
    pulse: Math.random()*Math.PI*2
  });
}

const particles = [];
for(let i=0;i<70;i++){
  let targetNode = nodes[Math.floor(Math.random()*nodes.length)];
  particles.push({
    x: targetNode.x,
    y: targetNode.y,
    target: targetNode,
    alpha: Math.random()*0.8+0.2,
    speed: 0.08+Math.random()*0.05,
    sparkle: Math.random()*2*Math.PI
  });
}

function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  for(let i=0;i<nodes.length;i++){
    for(let j=i+1;j<nodes.length;j++){
      let dx = nodes[i].x - nodes[j].x;
      let dy = nodes[i].y - nodes[j].y;
      let dist = Math.sqrt(dx*dx + dy*dy);
      if(dist<150){
        let alpha = (1-dist/150)*0.6 + 0.2;
        ctx.strokeStyle = `rgba(0,255,255,${alpha})`;
        ctx.lineWidth = 1 + Math.sin(Date.now()/200)*1;
        ctx.beginPath();
        ctx.moveTo(nodes[i].x,nodes[i].y);
        ctx.lineTo(nodes[j].x,nodes[j].y);
        ctx.stroke();
      }
    }
  }

  nodes.forEach(n=>{
    let pr = n.radius + Math.sin(n.pulse)*2;
    ctx.fillStyle = `rgba(0,255,255,${0.5 + Math.sin(n.pulse)/2})`;
    ctx.beginPath();
    ctx.arc(n.x,n.y,pr,0,Math.PI*2);
    ctx.fill();
    n.x += n.vx;
    n.y += n.vy;
    n.pulse += 0.05;

    if(n.x<0||n.x>canvas.width) n.vx*=-1;
    if(n.y<0||n.y>canvas.height) n.vy*=-1;
  });

  particles.forEach(p=>{
    p.x += (p.target.x - p.x)*p.speed;
    p.y += (p.target.y - p.y)*p.speed;

    let sparkle = Math.sin(p.sparkle)*0.5 + 0.5;
    ctx.strokeStyle = `rgba(0,255,255,${p.alpha*sparkle})`;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(p.x,p.y);
    ctx.lineTo(p.target.x,p.target.y);
    ctx.stroke();

    p.sparkle += 0.2;

    if(Math.abs(p.x - p.target.x)<2 && Math.abs(p.y - p.target.y)<2){
      p.target = nodes[Math.floor(Math.random()*nodes.length)];
      p.alpha = Math.random()*0.8+0.2;
    }
  });

  requestAnimationFrame(animate);
}

animate();

window.addEventListener('resize', ()=>{
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});
</script>

</body>
</html>
