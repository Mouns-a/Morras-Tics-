<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Noticias | Morras TIC's</title>

  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/noticias.css">
  <link rel="stylesheet" href="css/global.css">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>

<header>
  <div class="logo-container">
    <img src="assets/img/logo-morras-tics.png" alt="Logo Morras TICs" class="logo-img">
    <span class="logo-text">Morras TICs</span>
  </div>

  <nav class="nav">
    <a href="index.html">Inicio</a>
    <a href="SobreNosotras.html">Sobre Nosotras</a>
    <a href="Articulos.html">Artículos</a>
    <a href="Noticias.html" class="activo">Noticias</a>
    <a href="avisos.html">Avisos</a>
    <a href="Contactos.html">Contacto</a>
  </nav>
</header>

<section class="noticias">

  <h1 class="titulo">📰 Noticias Morras TICs</h1>

  <input type="text" id="buscador-noticias" placeholder="Buscar noticia..." class="buscador">

  <!-- ⭐ DESTACADA -->
  <div id="destacada"></div>

  <!-- 📰 LISTA -->
  <div id="contenedor-noticias" class="grid-noticias"></div>

</section>

<footer>
  <p>© 2026 Morras TIC's</p>
</footer>

<div class="cursor-luz"></div>

<!-- ✅ JS BIEN SEPARADO -->
<script src="js/global.js"></script>

<script>
document.addEventListener("DOMContentLoaded", () => {

  const contenedor = document.getElementById("contenedor-noticias");
  const noticias = JSON.parse(localStorage.getItem("noticias")) || [];

  if (noticias.length === 0) {
    contenedor.innerHTML = "<p>No hay noticias publicadas por ahora.</p>";
    return;
  }

  noticias.reverse().forEach(n => {
    const card = document.createElement("div");
    card.className = "card-noticia";

    card.innerHTML = `
      ${n.imagen ? `<img src="${n.imagen}">` : ''}
      <div class="card-content">
        <span class="fecha-noticia">📅 ${n.fecha}</span>
        <h3>${n.titulo}</h3>
        <p>${n.descripcion}</p>
      </div>
    `;

    contenedor.appendChild(card);
  });

});
</script>

</body>
</html>
