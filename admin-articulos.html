<section class="section" style="padding-top:120px; max-width:800px; margin:auto;">

  <h1 class="titulo">Panel Artículos 🧠</h1>

  <form id="form-articulo" class="form">

    <input type="text" id="titulo" placeholder="Título" required>
    <input type="text" id="autor" placeholder="Autor" required>

    <select id="categoria">
      <option value="tecnologia">Tecnología</option>
      <option value="ciberseguridad">Ciberseguridad</option>
      <option value="ia">Inteligencia Artificial</option>
    </select>

    <textarea id="contenido" placeholder="Contenido del artículo" required></textarea>

    <input type="file" id="imagen">

    <label>
      <input type="checkbox" id="destacado"> Destacado ⭐
    </label>

    <button type="submit">Publicar 🚀</button>

  </form>

</section>

<script src="js/admin-articulos.js"></script>
