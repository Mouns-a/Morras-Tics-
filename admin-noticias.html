<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Noticias</title>

  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/adminnot.css">
</head>

<body>

<section class="admin-container">

  <h1 class="titulo">⚡ Panel Admin Noticias</h1>
  <div class="navbar">
  <a href="admin-noticias.html?admin=morras123">📰 Noticias</a>
  <a href="admin-articulos.html?admin=morras123">📚 Artículos</a>
  <a href="admin.html?admin=morras123">📢 Avisos</a>
</div>

  <!-- 📊 STATS -->
  <div class="stats-panel">
    <div class="stat">
      <h3 id="total">0</h3>
      <p>Total</p>
    </div>

    <div class="stat">
      <h3 id="urgentes">0</h3>
      <p>Urgentes</p>
    </div>

    <div class="stat">
      <h3 id="categorias">0</h3>
      <p>Categorías</p>
    </div>
  </div>

  <div class="admin-grid">

    <!-- FORM -->
    <div class="admin-card">
      <h2>➕ Crear</h2>

      <form id="form-noticia" class="form">

        <input type="text" id="titulo" placeholder="Título" required>

        <textarea id="descripcion" placeholder="Descripción"></textarea>

        <input type="date" id="fecha">

        <input type="file" id="imagen">

        <label>
          <input type="checkbox" id="destacada"> ⭐ Destacar noticia
        </label>

        <button type="submit">Publicar 🚀</button>
        <button type="button" id="preview-btn">👁️ Vista previa</button>

      </form>

      <div id="preview" class="preview-box"></div>
    </div>

    <!-- LISTA -->
    <div class="admin-card">
      <h2>📋 Publicaciones</h2>
      <div id="lista-noticias"></div>
    </div>

  </div>

  <button id="btn-salir" style="
  position:fixed; top:20px; right:20px;
  background:linear-gradient(90deg,#ff0055,#ff00ff);
  border:none; padding:10px 20px;
  border-radius:20px; color:white;
  cursor:pointer; font-weight:bold;
  z-index:999; box-shadow:0 0 15px #ff0055;">
  🚪 Cerrar sesión
</button>

</section>
<footer>
 <center>"Transformando el futuro, juntas en Morras TICs" ✨💜💻</center>
</footer>

<script type="module" src="js/admin-noticias.js"></script>

</body>
</html>
